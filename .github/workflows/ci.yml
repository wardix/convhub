name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: convhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js (for Playwright)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: bun install

      - name: Run linter and formatter checks
        run: bun run check

      - name: Run Backend Tests
        run: cd backend && bun test

      - name: Run Frontend Tests
        run: cd frontend && bun run test

      - name: Run Database Migrations
        run: cd backend && bun run db:migrate

      - name: Install Playwright E2E dependencies
        run: cd e2e && npm ci

      - name: Install Playwright Browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run E2E Playwright Tests
        run: cd e2e && npx playwright test --project chromium

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

  deploy:
    name: Deploy to Production
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Placeholder
        run: |
          echo "🚀 Deploying to production..."
          echo "TODO: Configure deployment target (e.g., Vercel, Railway, Fly.io)"
